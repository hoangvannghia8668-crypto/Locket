<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locket Gold - Hoàng Nghĩa</title>
    <style>
        body { font-family: sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; text-align: center; }
        #overlay { position: fixed; inset: 0; background: #fff; z-index: 99; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .author-img { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #F2C94C; margin-bottom: 20px; }
        .start-btn { background: #000; color: #fff; padding: 15px 40px; border-radius: 30px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .particle { position: fixed; top: -20px; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }
        .card { background: #f9f9f9; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div id="overlay">
        <img src="https://github.com/hvn83222-creator.png" class="author-img">
        <h2 style="margin-bottom: 25px;">HOÀNG NGHĨA</h2>
        <button class="start-btn" onclick="start()">KHÁM PHÁ NGAY</button>
    </div>
    <div class="card">
        <h1>LOCKET GOLD PRO</h1>
        <p>© 2026 HOÀNG NGHĨA</p>
    </div>
    <audio id="bgMusic" loop><source src="nhac.mp3" type="audio/mpeg"></audio>
    <script>
        function start() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 500);
            document.getElementById('bgMusic').play();
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = Math.random() > 0.5 ? '❤️' : '❄️';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.fontSize = (Math.random() * 20 + 10) + 'px';
                p.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }, 200);
        }
    </script>
</body>
</html>
